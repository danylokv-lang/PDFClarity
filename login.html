<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — PDFClarify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #F5F3F0;
      --surface:       #FFFFFF;
      --surface-muted: #F0EEEA;
      --primary:       #145DA0;
      --primary-hover: #0F4C81;
      --text-main:     #111827;
      --text-muted:    #6B7280;
      --text-faint:    #9CA3AF;
      --border:        rgba(15, 23, 42, 0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
    }

    /* ── Logo ─────────────────────────────────────────── */
    .logo-row {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 18px;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .logo-sub {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ── Card ─────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    /* ── Step header ──────────────────────────────────── */
    .step-header {
      margin-bottom: 24px;
    }
    .step-header h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .step-header p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .step-header p strong { color: var(--primary); font-weight: 600; }

    /* ── Form elements ────────────────────────────────── */
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text-main);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="email"]:focus,
    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(20,93,160,0.12);
    }
    input.code-input {
      letter-spacing: 0.35em;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
    }
    input::placeholder { color: var(--text-faint); letter-spacing: 0; }

    /* ── Buttons ──────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-ghost {
      background: none;
      border: none;
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: color 0.15s;
    }
    .btn-ghost:hover { color: var(--text-main); }

    /* ── Field group ──────────────────────────────────── */
    .field { margin-bottom: 16px; }

    /* ── Error ────────────────────────────────────────── */
    .error-box {
      display: none;
      align-items: center;
      gap: 8px;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #DC2626;
      margin-bottom: 16px;
    }
    .error-box.visible { display: flex; }

    /* ── Divider ──────────────────────────────────────── */
    .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }

    /* ── Footer note ──────────────────────────────────── */
    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--text-faint);
      margin-top: 20px;
    }
    .footer-note a { color: var(--text-faint); text-decoration: underline; }
    .footer-note a:hover { color: var(--text-main); }

    /* ── Spinner ──────────────────────────────────────── */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── OTP countdown ────────────────────────────────── */
    .resend-row {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 12px;
    }
    #resend-btn {
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--primary);
      font-weight: 500;
      cursor: pointer;
      text-decoration: underline;
    }
    #resend-btn:disabled { color: var(--text-faint); cursor: default; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrapper">

    <!-- Logo -->
    <div class="logo-row">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        PDFClarify
      </div>
      <p class="logo-sub" id="logo-sub">Sign in or create your account</p>
    </div>

    <!-- Card -->
    <div class="card">

      <!-- ── Step 1: Email ─────────────────────────────── -->
      <div id="step-email">
        <div class="step-header">
          <h2>Enter your email</h2>
          <p>We'll send a 6-digit code — no password needed.</p>
        </div>

        <form id="email-form">
          <div class="field">
            <label for="email-input">Email address</label>
            <input
              type="email"
              id="email-input"
              placeholder="you@company.com"
              autocomplete="email"
              required
              autofocus
            />
          </div>

          <div class="error-box" id="email-error">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="email-error-text"></span>
          </div>

          <div class="btn-group">
            <button type="submit" class="btn-primary" id="send-btn">
              Continue with email →
            </button>
          </div>
        </form>
      </div>

      <!-- ── Step 2: OTP ────────────────────────────────── -->
      <div id="step-otp" style="display:none;">
        <div class="step-header">
          <h2>Check your inbox</h2>
          <p>Enter the 6-digit code sent to <strong id="email-display"></strong></p>
        </div>

        <form id="otp-form">
          <div class="field">
            <label for="otp-input">6-digit code</label>
            <input
              type="text"
              id="otp-input"
              class="code-input"
              placeholder="· · · · · ·"
              maxlength="6"
              inputmode="numeric"
              autocomplete="one-time-code"
              required
            />
          </div>

          <div class="error-box" id="otp-error">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="otp-error-text"></span>
          </div>

          <div class="btn-group">
            <button type="submit" class="btn-primary" id="verify-btn" disabled>
              Sign in
            </button>
            <button type="button" class="btn-ghost" id="back-btn">
              ← Use a different email
            </button>
          </div>
        </form>

        <div class="resend-row">
          Didn't get it?
          <button id="resend-btn" disabled>Resend in <span id="countdown">60</span>s</button>
        </div>
      </div>

    </div><!-- /card -->

    <p class="footer-note">
      By continuing you agree to our
      <a href="index.html">Terms</a> and <a href="index.html">Privacy Policy</a>.
    </p>
  </div>

  <script>
    const emailStep   = document.getElementById('step-email');
    const otpStep     = document.getElementById('step-otp');
    const emailInput  = document.getElementById('email-input');
    const otpInput    = document.getElementById('otp-input');
    const sendBtn     = document.getElementById('send-btn');
    const verifyBtn   = document.getElementById('verify-btn');
    const backBtn     = document.getElementById('back-btn');
    const resendBtn   = document.getElementById('resend-btn');
    const emailDisp   = document.getElementById('email-display');
    const logoSub     = document.getElementById('logo-sub');
    const emailError  = document.getElementById('email-error');
    const emailErrTxt = document.getElementById('email-error-text');
    const otpError    = document.getElementById('otp-error');
    const otpErrTxt   = document.getElementById('otp-error-text');
    const countdownEl = document.getElementById('countdown');

    let currentEmail  = '';
    let countdownTimer = null;

    // ── Helpers ─────────────────────────────────────────────────────────────
    function showError(box, txtEl, msg) {
      txtEl.textContent = msg;
      box.classList.add('visible');
    }
    function hideError(box) { box.classList.remove('visible'); }

    function setLoading(btn, loading, text) {
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<div class="spinner"></div> ' + text
        : text;
    }

    function startCountdown() {
      let secs = 60;
      countdownEl.textContent = secs;
      resendBtn.disabled = true;
      resendBtn.textContent = 'Resend in ';
      resendBtn.appendChild(countdownEl);
      resendBtn.append('s');

      clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        secs--;
        countdownEl.textContent = secs;
        if (secs <= 0) {
          clearInterval(countdownTimer);
          resendBtn.disabled = false;
          resendBtn.textContent = 'Resend code';
        }
      }, 1000);
    }

    // ── Step 1: Send code ────────────────────────────────────────────────────
    document.getElementById('email-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError(emailError);
      const email = emailInput.value.trim();
      if (!email) return;

      setLoading(sendBtn, true, 'Sending…');

      try {
        const res  = await fetch('/api/auth/send-code', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email }),
        });
        const data = await res.json();

        if (!res.ok) {
          showError(emailError, emailErrTxt, data.error || 'Could not send code — try again');
          setLoading(sendBtn, false, 'Continue with email →');
          return;
        }

        currentEmail = email;
        emailDisp.textContent = email;
        logoSub.textContent = 'Check your inbox';

        // DEV: auto-fill OTP returned from API (remove before launch)
        if (data.otp) otpInput.value = data.otp.toString();

        emailStep.style.display = 'none';
        otpStep.style.display   = 'block';
        otpInput.focus();
        startCountdown();
        updateVerifyBtn();

      } catch {
        showError(emailError, emailErrTxt, 'Network error — please try again');
        setLoading(sendBtn, false, 'Continue with email →');
      }
    });

    // ── OTP input: only digits, enable verify when 6 digits ─────────────────
    otpInput.addEventListener('input', () => {
      otpInput.value = otpInput.value.replace(/\D/g, '');
      updateVerifyBtn();
    });

    function updateVerifyBtn() {
      verifyBtn.disabled = otpInput.value.length !== 6;
    }

    // ── Step 2: Verify ───────────────────────────────────────────────────────
    document.getElementById('otp-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError(otpError);
      const code = otpInput.value.trim();
      if (code.length !== 6) return;

      setLoading(verifyBtn, true, 'Verifying…');

      try {
        const res  = await fetch('/api/auth/verify', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email: currentEmail, code }),
        });
        const data = await res.json();

        if (!res.ok) {
          showError(otpError, otpErrTxt, data.error || 'Invalid code — please try again');
          setLoading(verifyBtn, false, 'Sign in');
          otpInput.select();
          return;
        }

        window.location.href = '/app.html';

      } catch {
        showError(otpError, otpErrTxt, 'Network error — please try again');
        setLoading(verifyBtn, false, 'Sign in');
      }
    });

    // ── Back button ──────────────────────────────────────────────────────────
    backBtn.addEventListener('click', () => {
      clearInterval(countdownTimer);
      hideError(otpError);
      otpInput.value = '';
      otpStep.style.display   = 'none';
      emailStep.style.display = 'block';
      logoSub.textContent = 'Sign in or create your account';
      setLoading(sendBtn, false, 'Continue with email →');
      emailInput.focus();
    });

    // ── Resend ───────────────────────────────────────────────────────────────
    resendBtn.addEventListener('click', async () => {
      if (resendBtn.disabled) return;
      resendBtn.disabled = true;
      hideError(otpError);

      try {
        await fetch('/api/auth/send-code', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email: currentEmail }),
        });
        startCountdown();
      } catch {
        resendBtn.disabled = false;
        resendBtn.textContent = 'Resend code';
      }
    });
  </script>
</body>
</html>
